# eclexiaiser manifest for vscode-a2ml

[project]
name = "vscode-a2ml"

[[functions]]
name = "index"
source = "src/index.ts"
energy-budget-mj = 10

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
